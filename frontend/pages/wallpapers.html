<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallpapers - Dream Furniture</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="../index.html">🪑 Dream Furniture</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link active" href="wallpapers.html">Wallpapers</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html">Cart <span id="cart-count" class="badge bg-danger">0</span></a></li>
                    <li class="nav-item"><a class="nav-link" href="orders.html">Orders</a></li>
                    <li class="nav-item" id="auth-nav">
                        <a class="nav-link" href="login.html">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Wallpapers Section -->
    <section class="py-5">
        <div class="container">
            <h2 class="mb-4">Interior Wallpapers & Decor</h2>
            
            <!-- Filter Section -->
            <div class="row mb-4">
                <div class="col-md-3">
                    <label class="form-label fw-bold">Filter by Style</label>
                    <select id="style-filter" class="form-select" onchange="filterWallpapers()">
                        <option value="">All Styles</option>
                        <option value="modern">Modern</option>
                        <option value="vintage">Vintage</option>
                        <option value="floral">Floral</option>
                        <option value="geometric">Geometric</option>
                        <option value="minimalist">Minimalist</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">Price Range</label>
                    <select id="price-filter" class="form-select" onchange="filterWallpapers()">
                        <option value="">All Prices</option>
                        <option value="0-20">Under $20</option>
                        <option value="20-50">$20 - $50</option>
                        <option value="50-100">$50 - $100</option>
                        <option value="100+">Over $100</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">&nbsp;</label>
                    <button class="btn btn-secondary w-100" onclick="resetFilters()">Reset Filters</button>
                </div>
            </div>

            <!-- Wallpapers Grid -->
            <div class="row" id="wallpapers-grid">
                <!-- Wallpapers will be loaded here -->
                <div class="col-12 text-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4">
        <div class="container text-center">
            <p>&copy; 2026 Dream Furniture. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/wallpapers.js"></script>
</body>
</html>
