<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar bg-dark text-white p-3" style="width: 250px; min-height: 100vh;">
            <h4 class="mb-4">🪑 Admin Panel</h4>
            <nav class="nav flex-column">
                <a class="nav-link text-white" href="dashboard.html">📊 Dashboard</a>
                <a class="nav-link text-white" href="products.html">📦 Products</a>
                <a class="nav-link text-white" href="orders.html">🛒 Orders</a>
                <a class="nav-link text-white" href="users.html">👥 Users</a>
                <a class="nav-link text-white" href="reports.html">📈 Reports</a>
                <a class="nav-link text-white active" href="settings.html">⚙️ Settings</a>
                <hr class="text-white">
                <a class="nav-link text-danger" href="#" onclick="logout()">🚪 Logout</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1">
            <nav class="navbar navbar-light bg-light border-bottom">
                <div class="container-fluid">
                    <span class="navbar-brand mb-0 h1">Settings</span>
                </div>
            </nav>

            <div class="container-fluid p-4">
                <h4 class="mb-3">System Settings</h4>

                <div class="row">
                    <div class="col-md-6">
                        <div class="card mb-3">
                            <div class="card-header">
                                <h5>Shipping Settings</h5>
                            </div>
                            <div class="card-body">
                                <form id="shipping-settings">
                                    <div class="mb-3">
                                        <label class="form-label">Standard Shipping (Rs)</label>
                                        <input type="number" class="form-control" id="standard-shipping" value="1500">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Colombo District (Rs)</label>
                                        <input type="number" class="form-control" id="colombo-shipping" value="2000">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Other Districts (Rs)</label>
                                        <input type="number" class="form-control" id="other-shipping" value="4000">
                                    </div>
                                    <button type="button" class="btn btn-primary" onclick="saveShippingSettings()">Save Changes</button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="card mb-3">
                            <div class="card-header">
                                <h5>Custom Table Base Prices</h5>
                            </div>
                            <div class="card-body">
                                <form id="table-pricing">
                                    <div class="mb-2">
                                        <label class="form-label">2x2.5 ft (Rs)</label>
                                        <input type="number" class="form-control" value="15000">
                                    </div>
                                    <div class="mb-2">
                                        <label class="form-label">2x3 ft (Rs)</label>
                                        <input type="number" class="form-control" value="18000">
                                    </div>
                                    <div class="mb-2">
                                        <label class="form-label">2x4 ft (Rs)</label>
                                        <input type="number" class="form-control" value="22000">
                                    </div>
                                    <button type="button" class="btn btn-primary" onclick="saveTablePricing()">Save Changes</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h5>Admin Account</h5>
                    </div>
                    <div class="card-body">
                        <p><strong>Username:</strong> admin</p>
                        <button class="btn btn-warning" onclick="changePassword()">Change Password</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
    <script>
        checkAuth();
    </script>
</body>
</html>
