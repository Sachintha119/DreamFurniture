<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar bg-dark text-white p-3" style="width: 250px; min-height: 100vh;">
            <h4 class="mb-4">🪑 Admin Panel</h4>
            <nav class="nav flex-column">
                <a class="nav-link text-white" href="dashboard.html">📊 Dashboard</a>
                <a class="nav-link text-white" href="products.html">📦 Products</a>
                <a class="nav-link text-white" href="orders.html">🛒 Orders</a>
                <a class="nav-link text-white active" href="users.html">👥 Users</a>
                <a class="nav-link text-white" href="reports.html">📈 Reports</a>
                <a class="nav-link text-white" href="settings.html">⚙️ Settings</a>
                <hr class="text-white">
                <a class="nav-link text-danger" href="#" onclick="logout()">🚪 Logout</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1">
            <nav class="navbar navbar-light bg-light border-bottom">
                <div class="container-fluid">
                    <span class="navbar-brand mb-0 h1">User Management</span>
                </div>
            </nav>

            <div class="container-fluid p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4>All Users (<span id="user-count">0</span>)</h4>
                    <div class="d-flex gap-2">
                        <input type="search" class="form-control" id="user-search" style="width: 250px;" placeholder="Search users by name or email...">
                        <button class="btn btn-secondary" onclick="location.reload()">🔄 Refresh</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Photo</th>
                                        <th>Name</th>
                                        <th>Email</th>
                                        <th>Phone</th>
                                        <th>Address</th>
                                        <th>Registered Date</th>
                                        <th>Orders</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="users-table">
                                    <!-- Users loaded here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- User Details Modal -->
    <div class="modal fade" id="userDetailsModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">User Profile</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-4 text-center">
                            <img id="user-photo" src="" style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover;" class="mb-3">
                            <h5 id="user-modal-name"></h5>
                            <p class="text-muted" id="user-modal-email"></p>
                        </div>
                        <div class="col-md-8">
                            <div class="mb-2">
                                <strong>Full Name:</strong>
                                <p id="user-modal-fullname"></p>
                            </div>
                            <div class="mb-2">
                                <strong>Email:</strong>
                                <p id="user-modal-email-detail"></p>
                            </div>
                            <div class="mb-2">
                                <strong>Phone:</strong>
                                <p id="user-modal-phone"></p>
                            </div>
                            <div class="mb-2">
                                <strong>Address:</strong>
                                <p id="user-modal-address"></p>
                            </div>
                            <div class="mb-2">
                                <strong>Registered Date:</strong>
                                <p id="user-modal-date"></p>
                            </div>
                            <div class="mb-2">
                                <strong>Total Orders:</strong>
                                <p id="user-modal-orders"></p>
                            </div>
                            <div class="mb-2">
                                <strong>Total Spent:</strong>
                                <p id="user-modal-spent"></p>
                            </div>
                        </div>
                    </div>
                    <hr>
                    <h6>Recent Orders</h6>
                    <div id="user-orders-list"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" id="deleteUserBtn">Delete User</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
    <script>
        checkAuth();
        loadUsers();

        // Search functionality
        document.getElementById('user-search').addEventListener('input', function() {
            const query = this.value.toLowerCase();
            const rows = document.querySelectorAll('#users-table tr');
            
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(query) ? '' : 'none';
            });
        });
    </script>
</body>
</html>
