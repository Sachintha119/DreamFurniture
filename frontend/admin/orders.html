<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Management - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar bg-dark text-white p-3" style="width: 250px; min-height: 100vh;">
            <h4 class="mb-4">🪑 Admin Panel</h4>
            <nav class="nav flex-column">
                <a class="nav-link text-white" href="dashboard.html">📊 Dashboard</a>
                <a class="nav-link text-white" href="products.html">📦 Products</a>
                <a class="nav-link text-white active" href="orders.html">🛒 Orders</a>
                <a class="nav-link text-white" href="users.html">👥 Users</a>
                <a class="nav-link text-white" href="reports.html">📈 Reports</a>
                <a class="nav-link text-white" href="settings.html">⚙️ Settings</a>
                <hr class="text-white">
                <a class="nav-link text-danger" href="#" onclick="logout()">🚪 Logout</a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1">
            <nav class="navbar navbar-light bg-light border-bottom">
                <div class="container-fluid">
                    <span class="navbar-brand mb-0 h1">Order Management</span>
                </div>
            </nav>

            <div class="container-fluid p-4">
                <h4 class="mb-3">All Orders</h4>

                <div class="card mb-3">
                    <div class="card-body">
                        <div class="row g-2 align-items-end">
                            <div class="col-md-3">
                                <label class="form-label">Search</label>
                                <input type="text" class="form-control" id="admin-order-search" placeholder="Order ID, customer, email">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Status</label>
                                <select class="form-select" id="admin-order-status-filter">
                                    <option value="all">All Statuses</option>
                                    <option value="pending">Pending</option>
                                    <option value="processing">Processing</option>
                                    <option value="shipped">Shipped</option>
                                    <option value="delivered">Delivered</option>
                                    <option value="cancelled">Cancelled</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-secondary w-100" type="button" onclick="clearAdminOrderFilters()">Clear Filters</button>
                            </div>
                            <div class="col-md-2">
                                <button class="btn btn-outline-danger w-100" type="button" onclick="removeAllCancelledOrders()">Remove All Cancelled</button>
                            </div>
                            <div class="col-md-2 text-md-end">
                                <small class="text-muted">Showing: <span id="admin-order-count">0</span></small>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div id="orders-list">
                            <!-- Orders loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
    <script>
        checkAuth();
        loadAdminOrders();
        initAdminOrderFilters();
    </script>
</body>
</html>
